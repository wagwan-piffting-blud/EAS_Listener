services:
    eas_listener:
        image: ghcr.io/wagwan-piffting-blud/eas-listener:latest # Use "latest" for the most recent stable release, or "lite" for a smaller image with Piper/Espeak TTS only (no Speechify Tom support, but much lighter on resources and faster to pull!)
        container_name: eas_listener
        restart: unless-stopped
        volumes:
            - ./data:/data
            - ./apprise.yml:/app/apprise.yml
            # - ./leadin.mp3:/app/leadin.mp3         # Include if you have lead-in audio and want to use it when relaying
            # - ./leadout.mp3:/app/leadout.mp3       # Include if you have lead-out audio and want to use it when relaying
            - ./config.json:/app/config.json
            # - ./cap_tts_replacement_config.json:/app/cap_tts_replacement_config.json # Include if you have a TTS replacement config for CAP alerts and want to use it
            # - ./icecast.xml:/etc/icecast2/icecast.xml # Include if you want to use the built-in Icecast server for a 24/7 stream of the audio being relayed
        env_file:
            - .env
        ports:
            - "${WEB_SERVER_PORT}:80"
            - "${MONITORING_BIND_PORT}:${MONITORING_BIND_PORT}"
            # - "8000:8000" # Include if you want to use the built-in Icecast server for a 24/7 stream of the audio being relayed
